<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакти КиївТеп (KyivTep) - зв'язок, консультація, замовлення</title>
  <meta name="description" content="Контакти КиївТеп (KyivTep): телефон, email та форма зворотного зв'язку для замовлення котлів, котельного обладнання і консультації у Києві.">
  <meta name="keywords" content="київтеп контакти, kyivtep contacts, киевтеп контакты, телефон київтеп, київ теп контакти, котли київ контакти">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kyivtep.com/contacts.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="uk_UA">
  <meta property="og:site_name" content="КиївТеп">
  <meta property="og:title" content="Контакти КиївТеп (KyivTep)">
  <meta property="og:description" content="Зв'яжіться з КиївТеп для консультації, замовлення та підбору котельного обладнання.">
  <meta property="og:url" content="https://kyivtep.com/contacts.html">
  <meta property="og:image" content="https://kyivtep.com/logo3.png">
  <link rel="icon" type="image/png" href="logo3.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="top-nav-logo" aria-label="На головну">
      <img src="logo5.png" alt="КиївТеп" class="top-nav-logo-img">
    </a>
    <nav class="top-nav-links" aria-label="Головне меню">
      <a href="products.html">Продукція</a>
      <a href="contacts.html" class="active" aria-current="page">Контакти</a>
      <a href="survey.html">Опитувальний лист</a>
    </nav>
  </header>
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div class="text-center mb-8">
        <h1 class="text-5xl tracking-wider text-gray-100 font-bold mb-4">КОНТАКТИ</h1>
      </div>

      <div class="contact-columns bg-black/10 border border-gray-700 p-8 lg:p-10 rounded-lg shadow-lg">
        <div class="contact-left">
          <div class="mb-3">
            <span class="block text-gray-300 text-sm">Тел.:</span>
            <a href="tel:+380635996989" class="text-white text-xl font-semibold">+380 63 599 6989</a>
          </div>
          <div>
            <span class="block text-gray-300 text-sm">e-mail:</span>
            <a href="mailto:kyivtep@gmail.com" class="text-white text-xl font-semibold">kyivtep@gmail.com</a>
          </div>
        </div>

        <div class="contact-right">
          <h2 class="text-2xl text-gray-100 font-semibold mb-6">Форма зв'язку</h2>
          <form id="contactForm" action="https://formsubmit.co/kyivtep@gmail.com" method="POST" class="space-y-5">
            <input type="hidden" name="_subject" value="Нове повідомлення з форми контактів">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="thankyou.html">
            <input type="text" name="_honey" style="display:none">
            <div>
              <label class="block text-gray-200 mb-2">Ім'я:</label>
              <input type="text" name="name" required minlength="2" maxlength="80" placeholder="Ваше ім'я" class="form-field" />
            </div>
            <div>
              <label class="block text-gray-200 mb-2">Email:</label>
              <input type="email" name="email" required placeholder="yourmail@example.com" class="form-field" />
            </div>
            <div>
              <label class="block text-gray-200 mb-2">Телефон:</label>
              <input type="tel" name="phone" inputmode="tel" pattern="^\+?\d[\d\s\-\(\)]{8,}$" placeholder="+ххх ххх хх хх" class="form-field" />
            </div>
            <div>
              <label class="block text-gray-200 mb-2">Тема:</label>
              <input type="text" name="subject" maxlength="120" placeholder="Тема звернення" class="form-field" />
            </div>
            <div>
              <label class="block text-gray-200 mb-2">Повідомлення:</label>
              <textarea name="message" rows="5" minlength="10" placeholder="Опишіть коротко ваш запит" class="form-field textarea-field" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Надіслати</button>
          </form>
        </div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-logo"><img src="logo4.png" alt="КиївТеп" class="footer-logo-img"></div>
        <div class="footer-contact">
          <div>Email: <a href="mailto:kyivtep@gmail.com">kyivtep@gmail.com</a></div>
          <div>Телефон: <a href="tel:+380635996989">+380 63 599 6989</a></div>
        </div>
      </div>
      <div class="footer-copy">© 2026 Всі права захищені</div>
    </footer>
    <script src="form-handler.js"></script>
</body>
</html>
