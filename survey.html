<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Опитувальний лист КиївТеп (KyivTep) - заявка на котельне обладнання</title>
  <meta name="description" content="Заповніть опитувальний лист КиївТеп (KyivTep), щоб отримати консультацію та комерційну пропозицію на котли і котельне обладнання у Києві.">
  <meta name="keywords" content="київтеп заявка, kyivtep form, киевтеп заявка, опитувальний лист котли київ, замовити котел київ">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://kyivtep.com/survey.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="uk_UA">
  <meta property="og:site_name" content="КиївТеп">
  <meta property="og:title" content="Опитувальний лист КиївТеп (KyivTep)">
  <meta property="og:description" content="Надішліть заявку на підбір котельного обладнання та отримайте відповідь від КиївТеп.">
  <meta property="og:url" content="https://kyivtep.com/survey.html">
  <meta property="og:image" content="https://kyivtep.com/logo3.png">
  <link rel="icon" type="image/png" href="logo3.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="survey-page">
  <header class="top-nav">
    <a href="index.html" class="top-nav-logo" aria-label="На головну">
      <img src="logo5.png" alt="КиївТеп" class="top-nav-logo-img">
    </a>
    <nav class="top-nav-links" aria-label="Головне меню">
      <a href="products.html">Продукція</a>
      <a href="survey.html" class="active" aria-current="page">Опитувальний лист</a>
      <a href="contacts.html">Контакти</a>
    </nav>
  </header>
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
      <div class="text-center mb-12">
        <h1 class="text-5xl tracking-wider text-gray-100 font-light mb-4">
          Опитувальний лист
        </h1>
        <p class="text-xl text-gray-300 font-light tracking-wide">
          Заповніть форму і ми зв'яжемося з вами найближчим часом
        </p>
      </div>

      <div class="bg-gray-800/50 backdrop-blur-sm border border-gray-700 p-8 md:p-12">
        <form id="surveyForm" action="https://formsubmit.co/kyivtep@gmail.com" method="POST" class="space-y-6">
          <input type="hidden" name="_subject" value="Нова заявка з опитувального листа">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="thankyou.html">
          <input type="text" name="_honey" style="display:none">
          <div class="grid md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm text-gray-300 mb-2 tracking-wide">
                Контактна особа *
              </label>
              <input
                type="text"
                name="contactPerson"
                minlength="2"
                maxlength="80"
                placeholder="Ім'я та прізвище"
                required
                class="w-full px-4 py-3 bg-gray-900 border border-gray-700 text-gray-100 focus:border-gray-500 focus:outline-none transition-colors"
              />
            </div>

            <div>
              <label class="block text-sm text-gray-300 mb-2 tracking-wide">
                Email *
              </label>
              <input
                type="email"
                name="email"
                placeholder="yourmail@example.com"
                required
                class="w-full px-4 py-3 bg-gray-900 border border-gray-700 text-gray-100 focus:border-gray-500 focus:outline-none transition-colors"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm text-gray-300 mb-2 tracking-wide">
              Телефон *
            </label>
            <input
              type="tel"
              name="phone"
              inputmode="tel"
              pattern="^\+?\d[\d\s\-\(\)]{8,}$"
              placeholder="+ххх ххх хх хх"
              required
              class="w-full px-4 py-3 bg-gray-900 border border-gray-700 text-gray-100 focus:border-gray-500 focus:outline-none transition-colors"
            />
          </div>

          <div>
            <label class="block text-sm text-gray-300 mb-2 tracking-wide">
              Додаткова інформація
            </label>
            <textarea
              name="additionalInfo"
              rows="4"
              maxlength="1200"
              placeholder="Додайте деталі про ваш запит"
              class="w-full px-4 py-3 bg-gray-900 border border-gray-700 text-gray-100 focus:border-gray-500 focus:outline-none transition-colors resize-none"
            ></textarea>
          </div>

          <div class="pt-4">
            <button
              type="submit"
              class="w-full px-8 py-4 bg-gray-700 text-gold tracking-wide hover:bg-gray-600 transition-colors"
            >
              Відправити заявку
            </button>
          </div>
        </form>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-logo"><img src="logo4.png" alt="КиївТеп" class="footer-logo-img"></div>
        <div class="footer-contact">
          <div>Email: <a href="mailto:kyivtep@gmail.com">kyivtep@gmail.com</a></div>
          <div>Телефон: <a href="tel:+380635996989">+380 63 599 6989</a></div>
        </div>
      </div>
      <div class="footer-copy">© 2026 Всі права захищені</div>
    </footer>
    <script src="form-handler.js"></script>
</body>
</html>
